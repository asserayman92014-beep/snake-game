<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game | لعبة ثعبان حماسية</title>
    
    <meta property="og:title" content="Snake Game | لعبة ثعبان حماسية">
    <meta property="og:description" content="لعبة أسطورية وممتعة من تطوير آسر">
    <meta property="og:image" content="favicon.png.jpeg">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/jpeg" href="favicon.png.jpeg">

    <style>
        /* التنسيق الأساسي للعبة */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            cursor: crosshair;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        .modal-screen {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #ff0055;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px #ff0055;
            z-index: 10;
        }
        .modal-screen h1 {
            color: #ff0055;
            margin-top: 10px;
        }
        #game-logo {
            cursor: pointer;
            transition: transform 0.2s;
        }
        #game-logo:hover {
            transform: scale(1.05);
        }

        /* تنسيق صندوق العداد السري الجديد المتوافق مع الموبايل */
        #counter-box {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-shadow: 0px 0px 15px #00ff00;
            font-family: sans-serif;
        }
        #counter-box img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="modal-screen">
        <img src="favicon.png.jpeg" id="game-logo" onclick="toggleCounter()" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 10px;">
        <h1>Asser Snake Evolution</h1>
        <p>مرحباً بك في الإصدار المطور والجديد</p>
        <button onclick="startGame()" style="padding: 10px 20px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold;">ابدأ اللعب الحماسي 🎮</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="counter-box" style="display: none;">
        <p style="margin: 0; font-weight: bold;">عدد زوار اللعبة الحقيقي:</p>
        <a href="https://www.hitwebcounter.com" target="_blank">
            <img src="https://hitwebcounter.com/counter/counter.php?page=asser_snake_game_super_secret_99" title="Counter Users" Alt="Visit Counter" border="0" />
        </a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ضبط مقاسات الكانفاس لتملأ الشاشة
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            // هنا بيبدأ منطق اللعبة اللوب الخاص بيك
            gameLoop();
        }

        function gameLoop() {
            // كود حركة الثعبان والبوتات والـ Leaderboard بتاعك شغال هنا دايماً
            requestAnimationFrame(gameLoop);
        }

        // الدالة السحرية لتشغيل وإخفاء العداد بلمسة واحدة على الأيقونة
        function toggleCounter() {
            var box = document.getElementById("counter-box");
            if (box.style.display === "none") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        // ضبط المقاسات لو الشاشة لفت أو اتغيرت في الموبايل
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
