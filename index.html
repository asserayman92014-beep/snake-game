<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asser Snake Evolution</title>
    
    <link rel="icon" type="image/jpeg" href="favicon.png.jpeg">
    <meta property="og:title" content="Asser Snake Evolution">
    <meta property="og:description" content="لعبة الثعبان المتطورة من تصميم المبرمج آسر">
    <meta property="og:image" content="favicon.png.jpeg">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            background-color: #111111;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }
        /* شاشة البداية الاحترافية مع الأيقونة */
        .modal-screen {
            position: absolute;
            background: rgba(15, 15, 15, 0.95);
            border: 3px solid #00ffff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px #00ffff;
            z-index: 100;
            width: 90%;
            max-width: 450px;
        }
        .modal-screen h1 {
            color: #00ffff;
            font-size: 28px;
            margin: 15px 0;
            text-shadow: 0 0 10px #00ffff;
        }
        .modal-screen p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .modal-screen img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
            cursor: pointer; /* الماوس بيتحول لإيد لما تقف على الصورة */
            transition: transform 0.2s;
        }
        .modal-screen img:hover {
            transform: scale(1.05);
        }
        .btn-start {
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            border: none;
            color: white;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
            transition: 0.2s;
        }
        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px #00ffff;
        }
        /* لوحة النتائج الإحصائية أثناء اللعب */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ffcc00;
            pointer-events: none;
            z-index: 10;
        }
        #ui-layer h2 {
            margin: 0 0 5px 0;
            color: #ffcc00;
            font-size: 20px;
        }
        /* لوحة الصدارة Leaderboard */
        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 15px;
            width: 220px;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
            z-index: 10;
        }
        #leaderboard h3 {
            margin: 0 0 10px 0;
            color: #ff0055;
            text-align: center;
            font-size: 18px;
        }
        .leader-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .leader-item.player {
            color: #00ffff;
            font-weight: bold;
        }

        /* تنسيق صندوق العداد السري الجديد تحت على اليمين */
        #counter-box {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-shadow: 0px 0px 15px #00ff00;
            font-family: sans-serif;
        }
        #counter-box img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="modal-screen">
        <img src="favicon.png.jpeg" id="game-logo" onclick="toggleCounter()" alt="Asser Snake Logo">
        <h1>Asser Snake Evolution</h1>
        <p>مرحباً بك في الإصدار المطور والذكي</p>
        <button class="btn-start" onclick="startGame()">ابدأ اللعب الحماسي 🎮</button>
    </div>

    <div id="ui-layer">
        <div id="scoreLabel">LENGTH: 1</div>
        <div id="bestLabel" style="color: #00ffcc;">BEST: 0</div>
    </div>

    <div id="leaderboard">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard-list"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="counter-box" style="display: none;">
        <p style="margin: 0; font-weight: bold;">عدد زوار اللعبة الحقيقي:</p>
        <a href="https://www.hitwebcounter.com" target="_blank">
            <img src="https://hitwebcounter.com/counter/counter.php?page=asser_snake_game_super_secret_100" title="Counter Users" Alt="Visit Counter" border="0" />
        </a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let gameActive = false;
        let score = 1;
        let bestScore = localStorage.getItem('asser_snake_best') || 0;
        document.getElementById('bestLabel').innerText = BEST: ${bestScore};

        let player = {
            x: width / 2,
            y: height / 2,
            radius: 12,
            color: '#00ffff',
            tail: [],
            angle: 0,
            speed: 4
        };

        let foods = [];
        let bots = [];
        const botNames = ['البرق ⚡', 'الصياد 🏹', 'شبح الليل 🥷', 'الإعصار 🌪️', 'المحترف 🔥'];

        for (let i = 0; i < 150; i++) {
            foods.push({
                x: Math.random() * width * 2 - width / 2,
                y: Math.random() * height * 2 - height / 2,
                radius: Math.random() * 4 + 2,
                color: hsl(${Math.random() * 360}, 100%, 50%)
            });
        }

        for (let i = 0; i < botNames.length; i++) {
            bots.push({
                name: botNames[i],
                x: Math.random() * width,
                y: Math.random() * height,
                radius: 11,
                color: hsl(${Math.random() * 360}, 80%, 60%),
                tail: [],
                angle: Math.random() * Math.PI * 2,
                speed: 2.5,
                score: Math.floor(Math.random() * 30) + 10
            });
        }

        let targetX = player.x;
        let targetY = player.y;

        window.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        });

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameActive = true;
            score = 1;
            player.tail = [];
            player.x = width / 2;
            player.y = height / 2;
            gameLoop();
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, width, height);

            let dx = targetX - player.x;
            let dy = targetY - player.y;
            player.angle = Math.atan2(dy, dx);

            if (Math.hypot(dx, dy) > 5) {
                player.x += Math.cos(player.angle) * player.speed;
                player.y += Math.sin(player.angle) * player.speed;
            }

            player.tail.push({ x: player.x, y: player.y });
            if (player.tail.length > score * 3) {
                player.tail.shift();
            }

            for (let i = 0; i < player.tail.length; i++) {
                ctx.beginPath();
                ctx.arc(player.tail[i].x, player.tail[i].y, player.radius * (i / player.tail.length), 0, Math.PI * 2);
                ctx.fillStyle = player.color;
                ctx.fill();
                ctx.closePath();
            }

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();

            bots.forEach(bot => {
                bot.angle += (Math.random() - 0.5) * 0.5;
                bot.x += Math.cos(bot.angle) * bot.speed;
                bot.y += Math.sin(bot.angle) * bot.speed;

                if (bot.x < 0 || bot.x > width) bot.angle = Math.PI - bot.angle;
                if (bot.y < 0 || bot.y > height) bot.angle = -bot.angle;

                bot.tail.push({ x: bot.x, y: bot.y });
                if (bot.tail.length > bot.score * 3) bot.tail.shift();

                for (let i = 0; i < bot.tail.length; i++) {
                    ctx.beginPath();
                    ctx.arc(bot.tail[i].x, bot.tail[i].y, bot.radius * (i / bot.tail.length), 0, Math.PI * 2);
                    ctx.fillStyle = bot.color;
                    ctx.fill();
                    ctx.closePath();
                }
            });

            foods.forEach(food => {
                ctx.beginPath();
                ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
                ctx.fillStyle = food.color;
                ctx.fill();
                ctx.closePath();

                if (Math.hypot(player.x - food.x, player.y - food.y) < player.radius + food.radius) {
                    score += 1;
                    document.getElementById('scoreLabel').innerText = LENGTH: ${score};
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('asser_snake_best', bestScore);
                        document.getElementById('bestLabel').innerText = BEST: ${bestScore};
                    }
                    food.x = Math.random() * width;
                    food.y = Math.random() * height;
                }
            });

            updateLeaderboard();
            requestAnimationFrame(gameLoop);
        }

        function updateLeaderboard() {
            let list = [{ name: 'Asser (أنت) ⭐', score: score }];
            bots.forEach(b => list.push({ name: b.name, score: b.score }));
            list.sort((a, b) => b.score - a.score);

            let html = '';
            list.forEach((item, index) => {
                let isPlayer = item.name.includes('Asser') ? 'player' : '';
                html += `<div class="leader-item ${isPlayer}">
                    <span>${index + 1}. ${item.name}</span>
                    <span>${item.score}</span>
                </div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html;
        }

        // دالة تشغيل وإخفاء العداد السري عند الضغط على صورة شاشة البداية
        function toggleCounter() {
            var box = document.getElementById("counter-box");
            if (box.style.display === "none") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
    </script>
</body>
</html>
