<body>

<!-- شاشة البداية الاحترافية -->
<div id="startScreen" class="modal-screen">
    <h1>Asser Snake Evolution</h1>
    <p>شركة ai.prog ترحب بكم في الإصدار المطور</p>
    
    <div class="color-section">
        <label for="snakeColor">🎨 اختر لون ثعبانك:</label>
        <input type="color" id="snakeColor" value="#00ffff">
    </div>

    <div class="btn-container">
        <button class="menu-btn btn-offline" onclick="startGame(false)">لعب أوفلاين (مع البوتات) 🤖</button>
        <button class="menu-btn btn-online" onclick="startMatchmaking()">لعب أونلاين (سيرفر حقيقي) 🌐</button>
    </div>
</div>

<!-- شاشة الخسارة الاحترافية -->
<div id="gameOverScreen" class="modal-screen" style="display: none;">
    <h2>لقد خسرت! 💀</h2>
    <div class="rank-info">
        🏆 المركز الحالي: <span id="finalRank">-</span><br>
        📏 طول الثعبان: <span id="finalScore">-</span><br>
        🔥 أعلى رقم قياسي (BEST): <span id="finalBest">-</span>
    </div>
    <button class="menu-btn btn-retry" onclick="restartGame()">إعادة المحاولة 🔄</button>
</div>

<!-- واجهة المستخدم أثناء اللعب -->
<div id="ui">
    <div class="score-container">LENGTH: <span id="scoreVal">25</span></div>
    <div class="best-score-container">BEST: <span id="bestScoreVal">0</span></div>
    <div class="stats">
        Status: <span id="status" style="color: #0f0;">Hunting</span><br>
        Nearby Enemies: <span id="botCount">0</span>
    </div>
</div>

<div id="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <div id="lbList"></div>
</div>
   
<canvas id="gameCanvas"></canvas>

<script>
const WORLD_SIZE = 15000;      
const VIEW_DISTANCE = 1000;    
const MAX_BOTS_NEARBY = 18;    
const BASE_SPEED = 5.5;        
const TURN_SPEED = 0.12;       

const botNames = ["البرق ⚡", "الزلزال 🌋", "الصياد 🏹", "التنين 🐉", "النجم ⭐", "المحارب ⚔️", "الرعد ⛈️", "الملك 👑", "آكل النقط 🍎", "الهروب الكبير 🏃", "شبح الليل 👻"];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height;
let mouse = { x: 0, y: 0 };
let player;
let bots = [];
let foods = [];
let gameStarted = false;
let currentRank = 1;

let bestScore = localStorage.getItem('asserSnakeBestScore') ? parseInt(localStorage.getItem('asserSnakeBestScore')) : 0;
document.getElementById('bestScoreVal').innerText = bestScore;

function randomRange(min, max) { return Math.random() * (max - min) + min; }
function getDist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

class Worm {
    constructor(x, y, color, name, isBot = true) {
        this.name = name;
        this.color = color;
        this.isBot = isBot;
        this.segments = [];
        this.angle = Math.random() * Math.PI * 2;
        this.radius = 12;
        this.dead = false;
        this.speed = BASE_SPEED;
        
        for (let i = 0; i < 25; i++) {
            this.segments.push({ x: x, y: y });
        }
    }

    update() {
        if (this.dead) return;

        if (!this.isBot) {
            this.color = document.getElementById("snakeColor").value;
        }

        const head = this.segments[0];

        if (this.isBot) {
            this.angle += randomRange(-0.15, 0.15);
            if(head.x < 500 || head.x > WORLD_SIZE - 500 || head.y < 500 || head.y > WORLD_SIZE - 500) {
                this.angle += 0.2;
            }
        } else {
            const targetAngle = Math.atan2(mouse.y - height/2, mouse.x - width/2);
            let diff = targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * TURN_SPEED;
        }

        const newHead = {
            x: head.x + Math.cos(this.angle) * this.speed,
            y: head.y + Math.sin(this.angle) * this.speed
        };

        this.segments.unshift(newHead);
        this.segments.pop();

        this.checkFood();
    }

    checkFood() {
        const head = this.segments[0];
        for (let i = foods.length - 1; i >= 0; i--) {
            const f = foods[i];
            if (getDist(head.x, head.y, f.x, f.y) < this.radius + f.size) {
                foods.splice(i, 1);
                this.grow(f.value || 1);
            }
        }
    }

    grow(amount) {
        const tail = this.segments[this.segments.length - 1];
        for(let i=0; i < amount; i++) {
            this.segments.push({ x: tail.x, y: tail.y });
        }
    }

    die() {
        if (this.dead) return;
        this.dead = true;
        this.segments.forEach((seg, index) => {
            if (index % 3 === 0) {
                foods.push({
                    x: seg.x + randomRange(-5, 5),
                    y: seg.y + randomRange(-5, 5),
                    size: randomRange(4, 7),
                    color: this.color,
                    value: 3
                });
            }
        });
    }

    draw(camX, camY) {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius * 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        ctx.moveTo(this.segments[0].x - camX, this.segments[0].y - camY);
        for (let i = 1; i < this.segments.length; i++) {
            ctx.lineTo(this.segments[i].x - camX, this.segments[i].y - camY);
        }
        ctx.stroke();

        const head = this.segments[0];
        ctx.fillStyle = "white";
        const eyeX = head.x - camX + Math.cos(this.angle) * 7;
        const eyeY = head.y - camY + Math.sin(this.angle) * 7;
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    }
}

function spawnSystem() {
    const head = player.segments[0];
    while (foods.length < 500) {
        foods.push({
            x: randomRange(head.x - VIEW_DISTANCE, head.x + VIEW_DISTANCE),
            y: randomRange(head.y - VIEW_DISTANCE, head.y + VIEW_DISTANCE),
            size: randomRange(2, 4),
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            value: 1
        });
    }

    bots = bots.filter(b => getDist(head.x, head.y, b.segments[0].x, b.segments[0].y) < VIEW_DISTANCE + 500);

    while (bots.length < MAX_BOTS_NEARBY) {
        const ang = Math.random() * Math.PI * 2;
        const dist = VIEW_DISTANCE;
        const randomName = botNames[Math.floor(Math.random() * botNames.length)];
        bots.push(new Worm(
            head.x + Math.cos(ang) * dist,
            head.y + Math.sin(ang) * dist,
            `hsl(${Math.random() * 360}, 80%, 60%)`,
            randomName
        ));
    }
}

function collisionSystem() {
    const pHead = player.segments[0];

    if (pHead.x < 0 || pHead.x > WORLD_SIZE || pHead.y < 0 || pHead.y > WORLD_SIZE) {
        triggerGameOver();
    }

    for (let b of bots) {
        const bHead = b.segments[0];

        for (let i = 0; i < b.segments.length; i++) {
            if (getDist(pHead.x, pHead.y, b.segments[i].x, b.segments[i].y) < player.radius + b.radius - 2) {
                triggerGameOver();
            }
        }
        
        for (let i = 0; i < player.segments.length; i++) {
            if (getDist(bHead.x, bHead.y, player.segments[i].x, player.segments[i].y) < b.radius + player.radius - 2) {
                b.die();
            }
        }

        for (let other of bots) {
            if (b === other) continue;
            if (getDist(bHead.x, bHead.y, other.segments[0].x, other.segments[0].y) < b.radius + other.radius) {
                b.die();
            }
        }
    }
    bots = bots.filter(b => !b.dead);
}

function triggerGameOver() {
    if(player.dead) return;
    player.die();
    gameStarted = false;
    
    // عرض البيانات في شاشة الخسارة الاحترافية
    document.getElementById('finalRank').innerText = currentRank + " من " + (bots.length + 1);
    document.getElementById('finalScore').innerText = player.segments.length;
    document.getElementById('finalBest').innerText = bestScore;
    
    // إخفاء الـ UI العادي وإظهار شاشة الخسارة
    document.getElementById('ui').style.display = "none";
    document.getElementById('leaderboard').style.display = "none";
    document.getElementById('gameOverScreen').style.display = "block";
}

function updateLeaderboard() {
    if (!gameStarted && player.dead) return;
    
    let allPlayers = [];
    if (!player.dead) {
        allPlayers.push({ name: player.name, score: player.segments.length, isPlayer: true });
    }
    bots.forEach(b => {
        allPlayers.push({ name: b.name, score: b.segments.length, isPlayer: false });
    });

    allPlayers.sort((a, b) => b.score - a.score);

    // معرفة مركز اللاعب الحالي
    let pIndex = allPlayers.findIndex(p => p.isPlayer);
    currentRank = pIndex !== -1 ? pIndex + 1 : currentRank;

    const lbList = document.getElementById('lbList');
    lbList.innerHTML = '';

    for (let i = 0; i < Math.min(5, allPlayers.length); i++) {
        const p = allPlayers[i];
        const item = document.createElement('div');
        item.className = 'lb-item';
        if (p.isPlayer) {
            item.innerHTML = `<span class="lb-player">${i+1}. ${p.name} (أنت)</span> <span>${p.score}</span>`;
        } else {
            item.innerHTML = `<span>${i+1}. ${p.name}</span> <span>${p.score}</span>`;
        }
        lbList.appendChild(item);
    }
}

setInterval(updateLeaderboard, 500);

function startGame(isOnline) {
    document.getElementById('startScreen').style.display = "none";
    document.getElementById('ui').style.display = "block";
    document.getElementById('leaderboard').style.display = "block";
    
    // تعيين لون الثعبان المختار
    player.color = document.getElementById("snakeColor").value;
    gameStarted = true;
}

// تنفيذ الـ if/else الذكية للأونلاين (المحاكاة الشرطية)
function startMatchmaking() {
    const onlineBtn = document.querySelector('.btn-online');
    onlineBtn.disabled = true;
    onlineBtn.innerText = "البحث عن غرف (1/2)... ⏳";
    
    setTimeout(() => {
        // شرط المحاكاة: لعدم وجود لاعب ثانٍ حالياً، يتم تنفيذ الـ else للعب مع البوتات
        alert("لم يتم العثور على لاعبين كافيين أونلاين حالياً! تم تحويلك للعب أوفلاين مع البوتات بواسطة شركة ai.prog 🚀");
        startGame(false);
    }, 3000);
}

function restartGame() {
    document.getElementById('gameOverScreen').style.display = "none";
    foods = [];
    bots = [];
    player = new Worm(WORLD_SIZE/2, WORLD_SIZE/2, document.getElementById("snakeColor").value, "Asser", false);
    startGame(false);
}

function gameLoop() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;

    if (gameStarted) {
        spawnSystem();
        collisionSystem();
        player.update();
        bots.forEach(b => b.update());
    }

    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, width, height);

    const camX = player.segments[0].x - width / 2;
    const camY = player.segments[0].y - height / 2;

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    for (let x = 0; x < WORLD_SIZE; x += 200) {
        ctx.beginPath(); ctx.moveTo(x - camX, -camY); ctx.lineTo(x - camX, WORLD_SIZE - camY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-camX, x - camY); ctx.lineTo(WORLD_SIZE - camX, x - camY); ctx.stroke();
    }

    foods.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(f.x - camX, f.y - camY, f.size, 0, Math.PI * 2);
        ctx.fill();
    });

    bots.forEach(b => b.draw(camX, camY));
    if(!player.dead) player.draw(camX, camY);

    if (gameStarted) {
        const currentScore = player.segments.length;
        document.getElementById('scoreVal').innerText = currentScore;
        document.getElementById('botCount').innerText = bots.length;

        if (currentScore > bestScore) {
            bestScore = currentScore;
            localStorage.setItem('asserSnakeBestScore', bestScore);
            document.getElementById('bestScoreVal').innerText = bestScore;
        }
    }

    requestAnimationFrame(gameLoop);
}

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// دعم اللمس للموبايل
window.addEventListener('touchmove', e => {
    if(e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
    }
});

player = new Worm(WORLD_SIZE/2, WORLD_SIZE/2, "#00ffff", "Asser", false);
gameLoop();
</script>
